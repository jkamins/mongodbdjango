    {% extends 'filmy/base.html' %}

{% block title %}Dodaj film — CineBase{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">Dodaj film</h1>
    <p class="page-subtitle">Wypełnij formularz aby dodać nowy film do bazy</p>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Tytuł</label>
            <input type="text" name="tytul" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Reżyser</label>
            <input type="text" name="rezyser" class="form-control" required>
        </div>
        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label">Rok</label>
                <input type="number" name="rok" class="form-control" min="1888" max="2099" required>
            </div>
            <div class="col-6">
                <label class="form-label">Ocena (0-10)</label>
                <input type="number" name="ocena" class="form-control" min="0" max="10" step="0.1" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Gatunek</label>
            <input type="text" name="gatunek" class="form-control" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Kraj</label>
            <input type="text" name="kraj" class="form-control" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-accent">Dodaj film</button>
            <a href="{% url 'filmy_lista' %}" class="btn btn-outline-light">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
