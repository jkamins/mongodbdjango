{% extends 'filmy/base.html' %}

{% block title %}Dodaj reżysera — Baza Filmów{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">Dodaj reżysera</h1>
    <p class="page-subtitle">Wypełnij formularz aby dodać nowego reżysera</p>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Imię</label>
            <input type="text" name="imie" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nazwisko</label>
            <input type="text" name="nazwisko" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Narodowość</label>
            <input type="text" name="narodowosc" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Rok urodzenia</label>
            <input type="number" name="urodzony" class="form-control" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Nagrody (oddziel przecinkami)</label>
            <input type="text" name="nagrody" class="form-control" placeholder="np. Oscar, BAFTA">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-accent">Dodaj reżysera</button>
            <a href="{% url 'rezyserzy_lista' %}" class="btn btn-outline-light">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
