{% extends 'filmy/base.html' %}

{% block title %}Dodaj recenzję — Baza Filmów{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">Dodaj recenzję</h1>
    <p class="page-subtitle">Wypełnij formularz aby dodać nową recenzję</p>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Film</label>
            <select name="film" class="form-select" required>
                {% for f in filmy %}
                    <option value="{{ f.tytul }}">{{ f.tytul }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Autor</label>
            <input type="text" name="autor" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ocena (1-10)</label>
            <input type="number" name="ocena" class="form-control" min="1" max="10" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Treść</label>
            <textarea name="tresc" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-4">
            <label class="form-label">Data</label>
            <input type="date" name="data" class="form-control" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-accent">Dodaj recenzję</button>
            <a href="{% url 'recenzje_lista' %}" class="btn btn-outline-light">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
