{% extends 'filmy/base.html' %}

{% block title %}Edytuj recenzję — Baza Filmów{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="page-title">Edytuj recenzję</h1>
    <p class="page-subtitle">{{ recenzja.film }}</p>
</div>

<div class="card p-4" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Film</label>
            <input type="text" name="film" class="form-control" value="{{ recenzja.film }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Autor</label>
            <input type="text" name="autor" class="form-control" value="{{ recenzja.autor }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ocena (1-10)</label>
            <input type="number" name="ocena" class="form-control" value="{{ recenzja.ocena }}" min="1" max="10" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Treść</label>
            <textarea name="tresc" class="form-control" rows="4" required>{{ recenzja.tresc }}</textarea>
        </div>
        <div class="mb-4">
            <label class="form-label">Data</label>
            <input type="date" name="data" class="form-control" value="{{ recenzja.data }}" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-accent">Zapisz zmiany</button>
            <a href="{% url 'recenzje_lista' %}" class="btn btn-outline-light">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
